<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamento JS</title>
</head>
<body>
    <main>
        <h1>Treinamento JS</h1>
        <label for="numero">
            Digite 10 Números
        </label>

        <input type="number" name="numero" id="numero">

        <button id="btn-add">➕</button>

        <small id="txt-contar">
            Restam 10 números

        </small>

        <label for="inseridos">
            Númerso inseridos
        </label>
        <select name="inseridos" id="inseridos">
            <option value="" id="opt1">Insira um números</option>
            
        </select>

        <button id="btn-apagar">🗑️</button>

        <ul>
            <li>Primeiro número inserido: <span id="primeiro"></span></li>
            <li>Último número inserido: <span id="ultimo"></span></li>
            <li>Soma de todos números: <span id="soma"></span></li>
            <li>Maior número inserido: <span id="maior"></span></li>
            <li>Menor número inserido: <span id="menor"></span></li>
        </ul>

        <div id="box-btn">
            <button id="btn-finalizar" class="btn-class">Finalizar ✔️</button>
            <button id="btn-reiniciar" class="btn-class">Reiniciar ♻️</button>
        </div>
    </main>

   <script src="js/script.js"></script> 
</body>

</html>
